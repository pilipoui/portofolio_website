    <p>Air adalah benda <i>abiotik</i> yang meliputi <b>70% lapisan kerak bumi.</b> Secara kimiawi, air disebut sebagai <u>Dihydrogen Monoksida</u> dengan rumus <i>H<sub>2</sub>O</i> . Air jika bereaksi dengan <i>sulfur</i> akan menjadi <b><sub>asam sulfat</sub></b> (H<sub>2</sub>SO<sub>4</sub>). Jumlah air dibumi adalah sebanyak 1,26 <i>sekstiliun</i> 1,26 x 10<sup>21</sup> liter</p>
